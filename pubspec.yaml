name: jellyclient
description: "Client Jellyfin multiplateforme — dark cinéma"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.3

  # HTTP
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Images
  cached_network_image: ^3.4.1

  # Modèles
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  palette_generator: ^0.3.3+7
  uuid: ^4.5.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
